<!doctype html>
<html>
<head><title>Example Video Detail</title></head>
<body>
  <h1 id="shareBtn-title">Example Video Detail</h1>
  <div class="video-playlist-wrapper">
    <div id="playlist-top-block"><h4><a href="/series/example">Example Series</a></h4></div>
    <div id="playlist-scroll">
      <div class="playlist-hover-wrap" data-href="/watch?v=1001">
        <div class="thumb-container">
          <img class="main-thumb" src="/covers/1001.jpg" alt="Episode One">
          <span class="duration">12:34</span>
          <span class="stat-item"><span aria-hidden="true">thumb_up</span>98%</span>
          <span class="stat-item">1,234 views</span>
        </div>
        <h4 class="video-title"><a href="/watch?v=1001">Episode One</a></h4>
        <div class="meta-author"><a href="/author/example-a">Studio A</a></div>
        <div class="meta-stats"><a href="/search?genre=animation">Animation</a><span>2026-07-01</span></div>
      </div>
      <div class="playlist-hover-wrap videos-scroll" data-href="/watch?v=1002">
        <div class="thumb-container">
          <img class="main-thumb" src="/covers/1002.jpg" alt="Episode Two">
          <span class="duration">23:45</span>
          <span class="stat-item"><span aria-hidden="true">thumb_up</span>95%</span>
          <span class="stat-item">2,345 views</span>
        </div>
        <h4 class="video-title"><a href="/watch?v=1002">Episode Two</a></h4>
        <div class="meta-author"><a href="/author/example-b">Studio B</a></div>
        <div class="meta-stats"><a href="/search?genre=motion">Motion</a><span>2026-07-02</span></div>
      </div>
    </div>
  </div>
</body>
</html>
