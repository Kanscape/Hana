<!doctype html>
<html>
<head><title>Example Video Detail</title></head>
<body>
  <h1 id="shareBtn-title">Example Video Detail</h1>
  <div id="video-playlist-wrapper">
    <div><div><h4>Example Series</h4></div></div>
    <div id="playlist-scroll">
      <div class="legacy-series-item">
        <div><a href="/watch?v=1001">Open episode</a></div>
        <div class="card-mobile-panel-example">
          <div><div><div><img src="/covers/placeholder.jpg"><img src="/covers/1001.jpg" alt="Episode One"></div></div></div>
          <div class="card-mobile-duration">12:34</div>
          <div class="card-mobile-duration card-playlist-large"><span aria-hidden="true">thumb_up</span>98%</div>
          <div class="card-mobile-duration">1,234 views</div>
          <a class="card-mobile-user" href="/author/example-a">Studio A</a>
          <div class="meta-stats"><a href="/search?genre=animation">Animation</a><span>2026-07-01</span></div>
        </div>
      </div>
      <div class="legacy-series-item">
        <div><a href="/watch?v=1002">Open episode</a></div>
        <div class="card-mobile-panel-example">
          <div><div><div><img src="/covers/placeholder.jpg"><img src="/covers/1002.jpg" alt="Episode Two"></div><div>播放</div></div></div>
          <div class="card-mobile-duration">23:45</div>
          <div class="card-mobile-duration card-playlist-large"><span aria-hidden="true">thumb_up</span>95%</div>
          <div class="card-mobile-duration">2,345 views</div>
          <a class="card-mobile-user" href="/author/example-b">Studio B</a>
          <div class="meta-stats"><a href="/search?genre=motion">Motion</a><span>2026-07-02</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
